<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duval County Motivated Seller Leads</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group label {
            font-weight: 600;
            color: #555;
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .leads-grid {
            display: grid;
            gap: 20px;
        }

        .lead-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 5px solid #667eea;
        }

        .lead-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .lead-owner {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }

        .score-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .score-high {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .score-medium {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .lead-type {
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .lead-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }

        .detail-item {
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
        }

        .detail-label {
            font-size: 0.8em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-weight: 600;
            color: #333;
        }

        .flags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }

        .flag {
            background: #fff3cd;
            color: #856404;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            border: 1px solid #ffeaa7;
        }

        .flag.critical {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-state h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .lead-header {
                flex-direction: column;
            }

            .filter-group {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏘️ Duval County Motivated Seller Leads</h1>
            <p>Automated daily scraping of public records • Last updated: <span id="lastUpdate">Loading...</span></p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalLeads">-</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="withAddress">-</div>
                <div class="stat-label">With Address</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgScore">-</div>
                <div class="stat-label">Avg Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="dateRange">-</div>
                <div class="stat-label">Days Range</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Search:</label>
                <input type="text" id="searchInput" placeholder="Owner name, address, document #...">
                
                <label>Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="foreclosure">Foreclosure</option>
                    <option value="lien">Liens</option>
                    <option value="judgment">Judgments</option>
                    <option value="probate">Probate</option>
                    <option value="tax">Tax</option>
                </select>
                
                <label>Min Score:</label>
                <select id="scoreFilter">
                    <option value="0">All</option>
                    <option value="50">50+</option>
                    <option value="70">70+</option>
                    <option value="80">80+</option>
                    <option value="90">90+</option>
                </select>
            </div>
        </div>

        <div id="leadsContainer">
            <div class="loading">Loading leads...</div>
        </div>
    </div>

    <script>
        let allLeads = [];
        let filteredLeads = [];

        // Load data
        fetch('records.json')
            .then(response => response.json())
            .then(data => {
                allLeads = data.records || [];
                updateStats(data);
                filteredLeads = [...allLeads];
                renderLeads();
            })
            .catch(error => {
                document.getElementById('leadsContainer').innerHTML = `
                    <div class="empty-state">
                        <h2>No data available</h2>
                        <p>Waiting for first scrape run...</p>
                    </div>
                `;
            });

        function updateStats(data) {
            document.getElementById('lastUpdate').textContent = new Date(data.fetched_at).toLocaleString();
            document.getElementById('totalLeads').textContent = data.total.toLocaleString();
            document.getElementById('withAddress').textContent = data.with_address.toLocaleString();
            
            const avgScore = data.records.length > 0 
                ? Math.round(data.records.reduce((sum, r) => sum + r.score, 0) / data.records.length)
                : 0;
            document.getElementById('avgScore').textContent = avgScore;
            
            const start = new Date(data.date_range.start);
            const end = new Date(data.date_range.end);
            const days = Math.round((end - start) / (1000 * 60 * 60 * 24));
            document.getElementById('dateRange').textContent = days;
        }

        function renderLeads() {
            const container = document.getElementById('leadsContainer');
            
            if (filteredLeads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>No leads match your filters</h2>
                        <p>Try adjusting your search criteria</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="leads-grid">
                    ${filteredLeads.map(lead => renderLead(lead)).join('')}
                </div>
            `;
        }

        function renderLead(lead) {
            const scoreClass = lead.score >= 80 ? 'score-high' : lead.score >= 60 ? 'score-medium' : '';
            
            return `
                <div class="lead-card">
                    <div class="lead-header">
                        <div class="lead-owner">${escapeHtml(lead.owner)}</div>
                        <div class="score-badge ${scoreClass}">${lead.score}</div>
                    </div>
                    
                    <div>
                        <span class="lead-type">${lead.doc_type_name}</span>
                        <span class="lead-type">${lead.category_label}</span>
                    </div>

                    ${lead.flags.length > 0 ? `
                        <div class="flags">
                            ${lead.flags.map(flag => {
                                const critical = flag.includes('Lis pendens') || flag.includes('Pre-foreclosure');
                                return `<span class="flag ${critical ? 'critical' : ''}">${flag}</span>`;
                            }).join('')}
                        </div>
                    ` : ''}

                    <div class="lead-details">
                        <div class="detail-item">
                            <div class="detail-label">Document #</div>
                            <div class="detail-value">${lead.doc_num}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Filed Date</div>
                            <div class="detail-value">${lead.filed}</div>
                        </div>
                        ${lead.amount ? `
                            <div class="detail-item">
                                <div class="detail-label">Amount</div>
                                <div class="detail-value">$${lead.amount.toLocaleString()}</div>
                            </div>
                        ` : ''}
                        ${lead.grantee ? `
                            <div class="detail-item">
                                <div class="detail-label">Grantee</div>
                                <div class="detail-value">${escapeHtml(lead.grantee)}</div>
                            </div>
                        ` : ''}
                    </div>

                    ${lead.prop_address || lead.mail_address ? `
                        <div class="lead-details">
                            ${lead.prop_address ? `
                                <div class="detail-item">
                                    <div class="detail-label">Property Address</div>
                                    <div class="detail-value">
                                        ${escapeHtml(lead.prop_address)}<br>
                                        ${lead.prop_city}, ${lead.prop_state} ${lead.prop_zip || ''}
                                    </div>
                                </div>
                            ` : ''}
                            ${lead.mail_address ? `
                                <div class="detail-item">
                                    <div class="detail-label">Mailing Address</div>
                                    <div class="detail-value">
                                        ${escapeHtml(lead.mail_address)}<br>
                                        ${lead.mail_city}, ${lead.mail_state} ${lead.mail_zip || ''}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}

                    <div class="actions">
                        <a href="${lead.clerk_url}" target="_blank" class="btn btn-primary">View Record</a>
                        ${lead.prop_address ? `
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lead.prop_address + ' ' + lead.prop_city + ' FL')}" 
                               target="_blank" class="btn btn-secondary">Map</a>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Filters
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('scoreFilter').addEventListener('change', applyFilters);

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const minScore = parseInt(document.getElementById('scoreFilter').value);

            filteredLeads = allLeads.filter(lead => {
                // Search filter
                if (search && !JSON.stringify(lead).toLowerCase().includes(search)) {
                    return false;
                }

                // Category filter
                if (category && lead.category !== category) {
                    return false;
                }

                // Score filter
                if (lead.score < minScore) {
                    return false;
                }

                return true;
            });

            renderLeads();
        }
    </script>
</body>
</html>
