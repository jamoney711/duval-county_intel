name: Duval County Lead Scraper

on:
  schedule:
    # Run daily at 7 AM UTC (3 AM EST)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  scrape:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt
      
      - name: Install Playwright
        run: |
          python -m playwright install --with-deps chromium
      
      - name: Run scraper
        run: |
          python scraper/fetch.py
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dashboard/records.json data/records.json data/ghl_export.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update leads: $(date +'%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
